<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#081916" />
    <title>Marketing Dashboard | Enigsell</title>
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body>
    <div id="login-view" class="login-shell">
      <section class="login-card">
        <div class="brand-mark" aria-hidden="true">E</div>
        <p class="overline">ENIGSELL · MARKETING</p>
        <h1>Sign in to Source Center</h1>
        <form id="login-form">
          <label>
            Email
            <input id="email" type="email" autocomplete="username" required />
          </label>
          <label>
            Password
            <input
              id="password"
              type="password"
              autocomplete="current-password"
              minlength="8"
              required
            />
          </label>
          <button class="button primary wide" type="submit">Secure sign in</button>
          <p id="login-error" class="form-error" role="alert"></p>
        </form>
        <div class="security-note">
          <span class="status-dot"></span>
          Public signup is disabled
        </div>
      </section>
    </div>

    <div id="app-view" class="app-shell hidden">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <div class="brand-mark small">E</div>
          <div>
            <strong>Enigsell</strong>
            <span>Marketing Center</span>
          </div>
        </div>

        <nav aria-label="Main navigation">
          <p class="nav-label">DASHBOARD</p>
          <button class="nav-item active" data-view="overview">
            <span class="nav-icon">⌂</span>
            Overview
          </button>
          <p class="nav-label">SOURCES</p>
          <button class="nav-item" data-view="behtarino">
            <span class="source-badge behtarino">B</span>
            Behtarino
          </button>
          <button class="nav-item" data-view="torob">
            <span class="source-badge torob">T</span>
            Torob
            <span class="soon">COMING SOON</span>
          </button>
          <button class="nav-item" data-view="divar">
            <span class="source-badge divar">D</span>
            Divar
            <span class="soon">COMING SOON</span>
          </button>
        </nav>

        <div class="sidebar-user">
          <div class="avatar" id="user-avatar">M</div>
          <div>
            <strong id="user-name">Marketing Manager</strong>
            <span id="user-email"></span>
          </div>
          <button id="logout-button" class="icon-button" title="Sign out">↪</button>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="overline" id="page-eyebrow">MARKETING OVERVIEW</p>
            <h1 id="page-title">Source Overview</h1>
            <p id="page-subtitle" class="muted hidden"></p>
          </div>
          <button id="refresh-button" class="button secondary">Refresh</button>
        </header>

        <div id="toast" class="toast hidden" role="status"></div>
        <section id="content" aria-live="polite"></section>
      </main>
    </div>

    <script>
      window.ENIGSELL_MARKETING_API =
        window.ENIGSELL_MARKETING_API || "https://source-hub.enigsell.com";
    </script>
    <script src="./assets/app.js" defer></script>
  </body>
</html>
